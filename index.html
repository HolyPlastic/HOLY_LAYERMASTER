<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Holy Layer Master</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="activeCompLabel" class="comp-label">No Active Comp</div>
    <div class="section-title">Keyframe Memory</div>
    <div id="kfBanksContainer"></div>
    <div class="bank-controls">
        <button id="addKfBank" class="ctrl-btn add-btn">+</button>
        <button id="removeKfBank" class="ctrl-btn rem-btn">−</button>
    </div>
    <div class="section-title">Layer Memory</div>
    <div id="layBanksContainer"></div>
    <div class="bank-controls">
        <button id="addLayBank" class="ctrl-btn add-btn">+</button>
        <button id="removeLayBank" class="ctrl-btn rem-btn">−</button>
    </div>
    <div class="section-title">Search</div>
    <div class="row">
        <input type="text" placeholder="Search Layers..." id="searchInput">
        <button id="searchBtn" style="width: 74px;">Select</button>
    </div>
    <div class="row" style="margin-top: 6px;">
        <button id="reloadBtn" style="width: 100%; color: #666;">↺ Reload</button>
    </div>
    <script src="js/CSInterface.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
