    <script>
    (function STYLE_boot() {
      try {
        var hex = localStorage.getItem('hlm_accentColor') || '#ff7c44';
        var clean = hex.replace('#', '');
        var bigint = parseInt(clean, 16);
        var r = (bigint >> 16) & 255, g = (bigint >> 8) & 255, b = bigint & 255;
        var r1 = r / 255, g1 = g / 255, b1 = b / 255;
        var max = Math.max(r1, g1, b1), min = Math.min(r1, g1, b1);
        var h = 0, s = 0, l = (max + min) / 2;
        if (max !== min) {
          var d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          if (max === r1) h = (g1 - b1) / d + (g1 < b1 ? 6 : 0);
          else if (max === g1) h = (b1 - r1) / d + 2;
          else h = (r1 - g1) / d + 4;
          h /= 6;
        }
        var root = document.documentElement;
        root.style.setProperty('--accent', hex);
        root.style.setProperty('--ACCENT-H', Math.round(h * 360));
        root.style.setProperty('--ACCENT-S', Math.round(s * 100) + '%');
        root.style.setProperty('--ACCENT-L', Math.round(l * 100) + '%');
        root.style.setProperty('--ACCENT-RGB', r + ', ' + g + ', ' + b);
      } catch (err) {}
    })();
    </script>
</head>

                        <button id="hlmPickChildrenBtn" class="hunt-pickclick-btn" disabled title="Click to arm pick-click — then click a layer in the AE timeline">
                            <svg class="hunt-pickclick-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 151.12 177.31" aria-hidden="true" focusable="false">
                                <polyline points="75.83 52.21 58.82 40.58 40.8 66.93 73.58 89.35 106.47 41.26 51.86 3.91 3.91 74.02 81.47 127.51 134.38 49.59" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="7.82"/>
                                <path d="M147.03,130.59l-6.89,35.24c-.99,5.08-5.92,8.39-11,7.4l-35.24-6.89c-3.57-.7-6.41-3.39-7.29-6.92l-22.57-90.02c-.65-2.59,2.3-4.57,4.45-2.99l74.88,54.83c2.93,2.15,4.36,5.8,3.66,9.36Z" fill="var(--bg-base)" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="7.82"/>
                            </svg>
                        </button>
                    </div>
                    <div class="hunt-dim-item">
                        <label class="hunt-check-label">
                            <input type="checkbox" id="huntDimTrackMatte">
                            <span>Track Matte</span>
                        </label>
                        <input type="text" id="huntMatteInput" class="hunt-sub-input hunt-pick-input" placeholder="layer name" disabled title="Type a layer name, or use pick-click">
                        <button id="hlmPickMatteBtn" class="hunt-pickclick-btn" disabled title="Click to arm pick-click — then click a layer in the AE timeline">
                            <svg class="hunt-pickclick-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 151.12 177.31" aria-hidden="true" focusable="false">
                                <polyline points="75.83 52.21 58.82 40.58 40.8 66.93 73.58 89.35 106.47 41.26 51.86 3.91 3.91 74.02 81.47 127.51 134.38 49.59" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="7.82"/>
                                <path d="M147.03,130.59l-6.89,35.24c-.99,5.08-5.92,8.39-11,7.4l-35.24-6.89c-3.57-.7-6.41-3.39-7.29-6.92l-22.57-90.02c-.65-2.59,2.3-4.57,4.45-2.99l74.88,54.83c2.93,2.15,4.36,5.8,3.66,9.36Z" fill="var(--bg-base)" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="7.82"/>
                            </svg>
                        </button>
                    </div>
                    <div class="hunt-dim-item">
                        <label class="hunt-check-label">
                            <input type="checkbox" id="huntDimEffectRef">
                            <span>Effect refs</span>
                        </label>
                    </div>
                    <div class="hunt-dim-item">
                        <label class="hunt-check-label">
                            <input type="checkbox" id="huntDimComment">
                            <span>Comments</span>
                        </label>
                    </div>
                </div>
            </div>
            </div>

            <!-- Exclude row -->
            <div class="hunt-option-row">
                <label class="hunt-check-label">
                    <input type="checkbox" id="huntExcludeEnabled">
                    <span>Exclude</span>
                </label>
                <input type="text" id="huntExcludeInput" class="hunt-exclude-input" placeholder="Exclude chars / [null] [camera]\u2026" style="display:none" disabled>
            </div>

            <!-- Pattern detection section (collapsible) -->
            <div data-section-id="huntPatterns">
            <div class="section-header hunt-sub-header" data-body-id="huntPatternsBody">
                <svg class="section-star" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5.5 .5 6.57 4.43 10.5 5.5 6.57 6.57 5.5 10.5 4.43 6.57 .5 5.5 4.43 4.43 5.5 .5"/>
                </svg>
                <span class="section-title">Patterns</span>
                <div class="hunt-pattern-controls">
                    <button id="huntPatternMinus" class="hunt-ctrl-btn" title="Decrease min layers">-</button>
                    <span id="huntPatternCount">2</span>
                    <button id="huntPatternPlus" class="hunt-ctrl-btn" title="Increase min layers">+</button>
                </div>
            </div>
            <div class="section-body" id="huntPatternsBody">
                <div id="huntPatternChips"></div>
            </div>
            </div>

        </div>
        </div>

    </div><!-- /tab-hunt -->

    <!-- ── RENAME TAB ──────────────────────────── -->
    <div class="tab-panel" id="tab-rename">

        <div data-section-id="rename">
        <div class="section-header" data-body-id="renameBody">
            <svg class="section-star" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5.5 .5 6.57 4.43 10.5 5.5 6.57 6.57 5.5 10.5 4.43 6.57 .5 5.5 4.43 4.43 5.5 .5"/>
            </svg>
            <span class="section-title">RENAME</span>
        </div>
        <div class="section-body" id="renameBody">

            <!-- Scope selector -->
            <div class="rename-scope-row">
                <span class="rename-scope-label">SCOPE:</span>
                <select id="renameScopeSelect" class="rename-scope-select">
                    <option value="layers">Selected Layers in Comps</option>
                    <option value="project">Project Items (Comps &amp; Folders)</option>
                    <option value="both">Project Items + Contents</option>
                </select>
            </div>

            <!-- Mode selectors -->
            <div class="rename-modes">
                <button id="renameModeSearch" class="rename-mode-btn rename-mode-active" title="Search and replace text in layer names">SRCH</button>
                <button id="renameModePrefix" class="rename-mode-btn" title="Add text before layer name">PFX</button>
                <button id="renameModeSuffix" class="rename-mode-btn" title="Add text after layer name">SFX</button>
            </div>

            <!-- Fire row -->
            <div class="row" id="renameRow">
                <button id="renameFireBtn" class="icon-btn rename-fire-btn" title="Apply rename">
                    <svg viewBox="0 0 14.21 11" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                        <polyline points=".5 6.26 4.97 1.78 1.84 10.5 11.84 .5 9.24 9.76 13.71 5.28"/>
                    </svg>
                </button>
                <input type="text" id="renameInput1" placeholder="Search\u2026" title="Text to search for">
                <input type="text" id="renameInput2" placeholder="Replace\u2026" title="Replace with">
            </div>

            <!-- Options row -->
            <div class="rename-options-row">
                <label class="hunt-check-label">
                    <input type="checkbox" id="renameCaseSensitive">
                    <span>Case sensitive</span>
                </label>
                <label class="hunt-check-label">
                    <input type="checkbox" id="renamePreserveNumbers">
                    <span>Preserve numbers</span>
                </label>
                <label class="hunt-check-label">
                    <input type="checkbox" id="renameExcludeEnabled">
                    <span>Exclude</span>
                </label>
            </div>

            <!-- Exclude field (shown when enabled) -->
            <div id="renameExcludeRow" class="row" style="display:none">
                <input type="text" id="renameExcludeInput" class="hunt-exclude-input" placeholder="Skip these characters\u2026">
            </div>

        </div>
        </div>

    </div><!-- /tab-rename -->

    </div><!-- /tab-content -->

    ───────────────
    ─────────────────────────────────────────────── -->

    <!-- #region 🔁🔁🔁 SYSTEM
    ─────────────────────────────────────────────── -->
    <div class="row hp-sys-row">
        <button id="reloadBtn" class="sys-btn">
            <svg viewBox="0 0 14.21 11" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <line x1="2.21" y1="10.5" x2="12.21" y2=".5"/>
                <line x1=".5" y1="6.26" x2="4.97" y2="1.78"/>
                <line x1="9.24" y1="9.76" x2="13.71" y2="5.28"/>
            </svg>
            RELOAD
        </button>
    </div>

    ─────────────────────────────────────────────── -->

</div><!-- /hp-frame -->
